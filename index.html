<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finest Foods</title>

  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#f5f5f5;
      text-align:center;
    }

    header{
      background:#0f8f4d;
      color:white;
      padding:20px;
      font-size:28px;
      font-weight:bold;
    }

    .card{
      background:white;
      margin:20px;
      padding:20px;
      border-radius:15px;
      box-shadow:0 2px 8px rgba(0,0,0,.2);
    }

    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:12px;
      background:#0f8f4d;
      color:white;
      font-size:20px;
      margin-top:15px;
    }

    #producto{
      font-size:22px;
      font-weight:bold;
      margin-top:20px;
    }

    #precio{
      font-size:42px;
      color:#0f8f4d;
      font-weight:bold;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header>
🟢 Finest Foods
</header>

<div class="card">

<h2>Consulta de Precios</h2>

<button>
📷 Escanear Producto
</button>

<div id="producto">
Esperando escaneo...
</div>

<div id="precio">
B/. 0.00
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Finest Foods</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>

<script src="app.js" defer></script>

</head>

<body>

<header>

<div class="logo">

🟢 Finest Foods

</div>

<p class="subtitulo">

Consulta de precios

</p>

</header>

<main>

<div class="card">

<h2>🔍 Buscar producto</h2>

<input
id="buscar"
type="text"
placeholder="Código de barras">

<button id="buscarBtn">

🔍 Buscar

</button>

<button id="scanBtn">

📷 Escanear Código

</button>

<div class="resultado">

<div id="producto">

Esperando búsqueda...

</div>

<div id="precio">

B/. 0.00

</div>

<div id="codigo">

</div>

</div>

</div>

<div class="card">

<h2>➕ Agregar / Actualizar producto</h2>

<input
id="codigoNuevo"
type="text"
placeholder="Código de barras">

<button id="scanNuevoBtn">

📷 Escanear para agregar

</button>

<input
id="nombreNuevo"
type="text"
placeholder="Nombre del producto">

<input
id="precioNuevo"
type="number"
step="0.01"
min="0"
placeholder="Precio">

<button id="guardarBtn">

💾 Guardar Producto

</button>

<div id="mensajeGuardado"></div>

</div>

<video id="reader" muted playsinline></video>

<div class="card">

<h2>📂 Importar CSV (opcional)</h2>

<input
type="file"
id="csvFile"
accept=".csv">

<button id="cargarBtn">

📂 Cargar Productos desde CSV

</button>

</div>

</main>

</body>

</html>

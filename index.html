<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Finest Foods</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script src="app.js" defer></script>

</head>

<body>

<header>

<div class="logo">

🟢 Finest Foods

</div>

<p class="subtitulo">

Consulta de precios

</p>

</header>

<main>

<div class="card">

<input
type="file"
id="csvFile"
accept=".csv">

<button id="cargarBtn">

📂 Cargar Productos

</button>

<input
id="buscar"
type="text"
placeholder="Código de barras">

<button id="buscarBtn">

🔍 Buscar

</button>

<button id="scanBtn">

📷 Escanear Código

</button>

<div id="reader"></div>

<div class="resultado">

<div id="producto">

Esperando búsqueda...

</div>

<div id="precio">

B/. 0.00

</div>

<div id="codigo">

</div>

</div>

</div>

</main>

</body>

</html>
